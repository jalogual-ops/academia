<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretaría-Intervención: Academia Pro</title>
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-red: #ea4335;
            --google-green: #34a853;
            --google-gray: #70757a;
            --border: #dadce0;
            --bg: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: #3c4043;
            margin: 0;
            padding: 15px;
        }
        .container { max-width: 900px; margin: auto; }
        
        /* Estética Google Calendar */
        h1 { font-size: 24px; font-weight: 400; color: var(--google-gray); border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        h2 { font-size: 18px; font-weight: 500; color: var(--google-blue); margin-bottom: 10px; }

        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px rgba(60,64,67,0.15); }

        /* Calendario Google Style */
        .grid-calendar { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border); border-left: 1px solid var(--border); }
        .dia { 
            border-right: 1px solid var(--border); 
            border-bottom: 1px solid var(--border); 
            min-height: 80px; 
            padding: 5px; 
            cursor: pointer;
            transition: background 0.2s;
        }
        .dia:hover { background-color: #f8f9fa; }
        .dia-num { 
            font-size: 12px; font-weight: 500; text-align: center; 
            display: block; width: 24px; height: 24px; line-height: 24px; margin: 2px auto; 
        }
        .hoy .dia-num { background-color: var(--google-blue); color: white; border-radius: 50%; }
        
        .info-estudio { 
            background-color: var(--google-blue); color: white; 
            font-size: 10px; padding: 2px 4px; border-radius: 4px; 
            margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* Test y Botones */
        .opcion-test { 
            display: block; width: 100%; padding: 12px 16px; margin: 8px 0; 
            border: 1px solid var(--border); border-radius: 8px; background: white; 
            cursor: pointer; text-align: left; font-size: 14px; transition: 0.2s;
        }
        .opcion-test:hover { background-color: #f1f3f4; border-color: var(--google-blue); }
        .correcta { border-color: var(--google-green); background-color: #e6f4ea !important; color: #137333; font-weight: bold; }
        .incorrecta { border-color: var(--google-red); background-color: #fce8e6 !important; color: #c5221f; }

        .barra-progreso { background: #e8eaed; border-radius: 10px; height: 8px; margin: 15px 0; overflow: hidden; }
        #progreso-relleno { background: var(--google-green); height: 100%; transition: width 0.5s; width: 0%; }
        
        .lista-temas { max-height: 250px; overflow-y: auto; font-size: 14px; }
        .tema-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f1f3f4; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏛️ Academia Secretaría-Intervención</h1>

    <div class="card">
        <h2>Calendario de Planificación</h2>
        <div class="grid-calendar" id="cal-grid"></div>
    </div>

    <div class="card">
        <h2>Progreso del Temario</h2>
        <div class="barra-progreso"><div id="progreso-relleno"></div></div>
        <div id="temario-dom" class="lista-temas"></div>
    </div>

    <div class="card" id="test-section">
        <h2>Simulador de Test</h2>
        <div id="test-container">
            <p style="color: var(--google-gray)">Selecciona un tema o un día para comenzar el test.</p>
        </div>
    </div>
</div>

<script>

        ],

            { p: "¿Es la objeción de conciencia un derecho fundamental?", o: ["No, pero tiene amparo (30.2)", "Sí", "No existe"], r: 0 },
            { p: "¿Qué artículo prohíbe la tortura?", o: ["Art. 15", "Art. 10", "Art. 1"], r: 0 },
            { p: "¿Cuál es la mayoría de edad según el Art. 12?", o: ["18 años", "21 años", "16 años"], r: 0 },
            { p: "¿Qué artículo garantiza la igualdad ante la ley?", o: ["Art. 14", "Art. 10", "Art. 2"], r: 0 }
        ],
        5: [

            { p: "¿Quién refrenda los actos del Rey?", o: ["Presidente del Gobierno o Ministros", "Nadie", "Su familia"], r: 0 },
            { p: "¿Es la persona del Rey responsable?", o: ["Inviolable y no sujeta a responsabilidad", "Sí, ante el TS", "Sí, ante las Cortes"], r: 0 },

        ],

            { p: "¿Cuál es la cámara de representación territorial?", o: ["El Senado", "El Congreso", "Las CCAA"], r: 0 },
            { p: "¿Cuántos diputados tiene el Congreso?", o: ["Entre 300 y 400", "500", "250"], r: 0 },
            { p: "¿Cuál es la duración del mandato de las Cortes?", o: ["4 años", "5 años", "6 años"], r: 0 },
            { p: "¿Quién elige al Defensor del Pueblo?", o: ["Las Cortes Generales", "El Rey", "El Gobierno"], r: 0 },
            { p: "¿De quién depende el Tribunal de Cuentas?", o: ["De las Cortes Generales", "Del Poder Judicial", "Del Ministerio de Hacienda"], r: 0 },
            { p: "¿Qué órgano convalida los Decretos-Leyes?", o: ["El Congreso de los Diputados", "El Senado", "El Tribunal Supremo"], r: 0 },
            { p: "¿Tienen los parlamentarios inviolabilidad?", o: ["Sí, por opiniones en sus funciones", "No", "Solo el Presidente"], r: 0 },
            { p: "¿Qué mayoría se requiere para una Ley Orgánica?", o: ["Absoluta del Congreso", "Simple", "3/4"], r: 0 },
            { p: "¿Quién preside la sesión conjunta de las Cortes?", o: ["Presidente del Congreso", "Presidente del Senado", "El Rey"], r: 0 }
        ],
        7: [
            { p: "¿Quién dirige la política interior y exterior?", o: ["El Gobierno", "El Rey", "El Congreso"], r: 0 },
            { p: "¿Quién propone al Rey el nombramiento de Ministros?", o: ["El Presidente del Gobierno", "Las Cortes", "El pueblo"], r: 0 },
            { p: "¿Ante quién responde el Gobierno solidariamente?", o: ["Ante el Congreso de los Diputados", "Ante el Senado", "Ante el Rey"], r: 0 },
            { p: "¿Qué mayoría requiere la moción de censura?", o: ["Absoluta del Congreso", "Simple", "2/3"], r: 0 },
            { p: "¿Debe incluir la moción de censura un candidato?", o: ["Sí (Moción constructiva)", "No", "Solo si se quiere"], r: 0 },
            { p: "¿Quién plantea la cuestión de confianza?", o: ["El Presidente del Gobierno", "El Rey", "La Oposición"], r: 0 },
            { p: "¿Qué ocurre si el Congreso niega la confianza?", o: ["El Gobierno dimite", "Se disuelve el Senado", "No pasa nada"], r: 0 },
            { p: "¿Pueden los miembros del Gobierno ejercer comercio?", o: ["No, tienen incompatibilidad", "Sí", "Solo si es poco"], r: 0 },
            { p: "¿Quién nombra a los Secretarios de Estado?", o: ["El Consejo de Ministros", "El Rey", "El Presidente solo"], r: 0 },
            { p: "¿Dónde se regulan las funciones del Gobierno?", o: ["Título IV", "Título III", "Título V"], r: 0 }
        ],
        8: [
            { p: "¿En nombre de quién se administra la justicia?", o: ["Del Rey", "Del pueblo", "Del Estado"], r: 0 },
            { p: "¿Cuál es el órgano de gobierno de los jueces?", o: ["Consejo General del Poder Judicial", "Tribunal Supremo", "Ministerio de Justicia"], r: 0 },
            { p: "¿Son los jueces responsables?", o: ["Sí, e independientes e inamovibles", "No", "Solo ante el Rey"], r: 0 },
            { p: "¿Cuál es el órgano jurisdiccional superior en todos los órdenes?", o: ["Tribunal Supremo", "Tribunal Constitucional", "Audiencia Nacional"], r: 0 },
            { p: "¿Quién nombra al Fiscal General del Estado?", o: ["El Rey, a propuesta del Gobierno", "Los jueces", "Las Cortes"], r: 0 },
            { p: "¿Es la justicia gratuita?", o: ["Sí, para quienes acrediten insuficiencia de recursos", "Siempre", "Nunca"], r: 0 },
            { p: "¿Quién preside el TS y el CGPJ?", o: ["La misma persona", "El Rey", "El Ministro"], r: 0 },
            { p: "¿Cuántos vocales tiene el CGPJ?", o: ["20 más el Presidente", "10", "15"], r: 0 },
            { p: "¿Están prohibidos los tribunales de excepción?", o: ["Sí", "No", "Solo en guerra"], r: 0 },
            { p: "¿Qué principio rige la actuación de la Fiscalía?", o: ["Unidad de actuación y dependencia jerárquica", "Independencia total", "Anarquía"], r: 0 }
        ],
        9: [
            { p: "¿Cuántos miembros tiene el TC?", o: ["12", "10", "20"], r: 0 },
            { p: "¿Por cuánto tiempo son nombrados?", o: ["9 años", "4 años", "Vitalicios"], r: 0 },
            { p: "¿Quién propone a 4 miembros del TC?", o: ["El Congreso y otros 4 el Senado", "El Rey", "Las CCAA"], r: 0 },
            { p: "¿Qué recurso se interpone contra leyes?", o: ["Recurso de Inconstitucionalidad", "Recurso de Alzada", "Amparo"], r: 0 },
            { p: "¿Quién preside el TC?", o: ["Nombrado por el Rey entre sus miembros", "El Rey", "El Presidente del TS"], r: 0 },
            { p: "¿Son las sentencias del TC recurribles?", o: ["No, tienen valor de cosa juzgada", "Sí, ante el TS", "Sí, ante el Gobierno"], r: 0 },
            { p: "¿Tiene el TC jurisdicción en toda España?", o: ["Sí", "Solo en Madrid", "No"], r: 0 },
            { p: "¿Puede el TC declarar la nulidad de una ley?", o: ["Sí", "No, solo el Gobierno", "Solo el Rey"], r: 0 },
            { p: "¿Quién propone a 2 miembros del TC?", o: ["El Gobierno y otros 2 el CGPJ", "Las Cortes", "El pueblo"], r: 0 },
            { p: "La condición de miembro del TC es incompatible con...", o: ["Todo mandato representativo", "Nada", "Ser profesor"], r: 0 }
        ],
        10: [
            { p: "¿Qué principio rige a la Administración Pública?", o: ["Eficacia, jerarquía y descentralización", "Caos y lentitud", "Favoritismo"], r: 0 },
            { p: "¿Qué ley regula el Procedimiento Administrativo Común?", o: ["Ley 39/2015", "Código Penal", "Ley de Caza"], r: 0 },
            { p: "¿Cuál es un organismo autónomo?", o: ["Entidad con personalidad jurídica propia", "Un ministerio", "Una empresa privada"], r: 0 },
            { p: "¿Qué artículo de la CE habla de la Administración?", o: ["Art. 103", "Art. 1", "Art. 155"], r: 0 },
            { p: "¿Quién nombra a los funcionarios?", o: ["La Administración competente", "El Rey siempre", "El azar"], r: 0 },
            { p: "¿Qué es una Entidad Pública Empresarial?", o: ["Organismo que se financia con ingresos de mercado", "Una ONG", "Un partido"], r: 0 },
            { p: "¿Qué principio garantiza el acceso al empleo público?", o: ["Mérito y capacidad", "Amistad", "Antigüedad solo"], r: 0 },
            { p: "¿Está sometida la Administración a la Ley?", o: ["Sí, plenamente", "No", "Solo en parte"], r: 0 },
            { p: "¿Qué es la Administración Instrumental?", o: ["Organismos creados para tareas específicas", "La policía", "Los jueces"], r: 0 },
            { p: "¿Quién crea los Ministerios?", o: ["El Presidente del Gobierno por Real Decreto", "Las Cortes", "El Rey"], r: 0 }
        ]
    };

    const TITULOS = [
        "Tema 1: Estado social", "Tema 2: Transición", "Tema 3: Constitución",
        "Tema 4: Derechos", "Tema 5: Corona", "Tema 6: Cortes",
        "Tema 7: Gobierno", "Tema 8: Poder Judicial", "Tema 9: Tribunal Constitucional", "Tema 10: Admón. Pública"
    ];

    let tAct = null, pIdx = 0;

    function iniciar() { renderCal(); renderTem(); }

    function renderCal() {
        const grid = document.getElementById('cal-grid'), plan = JSON.parse(localStorage.getItem('p_si_g_v2') || "{}"), hoy = new Date().getDate();
        grid.innerHTML = "";
        for(let i=1; i<=31; i++) {
            const d = document.createElement('div');
            d.className = 'dia' + (i === hoy ? ' hoy' : '');
            const t = plan[i] || "";
            d.innerHTML = `<span class="dia-num">${i}</span>${t ? '<div class="info-estudio">Tema '+t+'</div>' : ''}`;
            d.onclick = () => {
                let n = prompt("Asignar Tema (1-10):", t);
                if(n !== null) { plan[i]=n; localStorage.setItem('p_si_g_v2', JSON.stringify(plan)); renderCal(); if(i==hoy) start(n); }
            };
            grid.appendChild(d); if(i==hoy && t) start(t);
        }
    }

    function renderTem() {
        const dom = document.getElementById('temario-dom'), prog = JSON.parse(localStorage.getItem('g_si_g_v2') || "[]");
        dom.innerHTML = "";
        TITULOS.forEach((tit, i) => {
            const id = i+1, chk = prog.includes(id) ? "checked" : "";
            dom.innerHTML += `<div class="tema-item">
                <input type="checkbox" ${chk} onchange="toggle(${id})"> 
                <span onclick="start(${id})" style="cursor:pointer; color:var(--google-blue); text-decoration: underline;">${tit}</span>
            </div>`;
        });
        document.getElementById('progreso-relleno').style.width = (prog.length * 10) + "%";
    }

    function toggle(id) {
        let g = JSON.parse(localStorage.getItem('g_si_g_v2') || "[]");
        g.includes(id) ? g = g.filter(x => x!==id) : g.push(id);
        localStorage.setItem('g_si_g_v2', JSON.stringify(g)); renderTem();
    }

    function start(id) { tAct = parseInt(id); pIdx = 0; loadP(); }

    function loadP() {
        const c = document.getElementById('test-container'), b = BANCO_TEST[tAct];
        if(!b || pIdx >= 10) { c.innerHTML = "<h3>✅ Tema completado</h3><p>¡Buen trabajo! Selecciona otro tema para seguir.</p>"; return; }
        const d = b[pIdx];
        c.innerHTML = `<p style="color:var(--google-gray); font-size:12px; margin:0">PREGUNTA ${pIdx+1} DE 10</p>
                      <p style="font-size:16px; margin:10px 0; font-weight: 500;">${d.p}</p>` + 
                      d.o.map((o, i) => `<button class="opcion-test" onclick="check(${i},${d.r},this)">${o}</button>`).join('') + `<div id="feedback" style="font-size:14px; margin-top:10px; height:20px;"></div>`;
    }

    function check(e, c, el) {
        const f = document.getElementById('feedback');
        const botones = document.querySelectorAll('.opcion-test');
        if(e===c) { 
            el.classList.add('correcta'); f.innerHTML = "✅ ¡Correcto!";
            botones.forEach(b => b.onclick = null);
            setTimeout(() => { pIdx++; loadP(); }, 1200); 
        } else { 
            el.classList.add('incorrecta'); f.innerHTML = "❌ Prueba de nuevo";
        }
    }

    window.onload = iniciar;
</script>
</body>
</html>
