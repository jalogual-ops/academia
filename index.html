<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Secretaría-Intervención</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f8f9fa; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 10px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 8px; }
        
        .grid-calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 20px; }
        .dia { border: 1px solid #ddd; min-height: 60px; padding: 5px; border-radius: 8px; background: #fff; cursor: pointer; }
        .dia-num { font-weight: bold; color: var(--accent); font-size: 0.9em; }
        .info-estudio { font-size: 0.7em; color: #555; margin-top: 3px; background: #fff3cd; border-radius: 3px; padding: 2px; }

        .barra-progreso { background: #eee; border-radius: 10px; height: 20px; margin: 15px 0; overflow: hidden; }
        #progreso-relleno { background: var(--success); width: 0%; height: 100%; transition: 0.5s; text-align: center; color: white; font-size: 0.8em; line-height: 20px; }
        
        .lista-temas { max-height: 200px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9em; }
        
        .caja-test { background: #eef2f7; padding: 20px; border-radius: 10px; border-left: 5px solid var(--accent); }
        .opcion-test { display: block; width: 100%; padding: 12px; margin: 8px 0; background: white; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; text-align: left; font-size: 1em; }
        .correcta { background: var(--success) !important; color: white; }
        .incorrecta { background: var(--danger) !important; color: white; }
        #feedback { font-weight: bold; margin-top: 10px; height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏛️ Secretaría-Intervención</h1>

    <h2>1. Calendario</h2>
    <div class="grid-calendar" id="cal-grid"></div>

    <h2>2. Temario</h2>
    <div class="barra-progreso"><div id="progreso-relleno">0%</div></div>
    <div class="lista-temas" id="temario-dom"></div>

    <h2>3. Test</h2>
    <div class="caja-test" id="test-container">
        <p>Selecciona un tema para comenzar.</p>
    </div>
</div>

<script>

            { p: "¿Qué título trata de la reforma constitucional?", o: ["Título X", "Título IX", "Título I"], r: 0 },

            { p: "¿Qué principio rige la estabilidad presupuestaria?", o: ["Principio de estabilidad", "Gasto ilimitado", "Inestabilidad"], r: 0 }
        ],

            { p: "¿Qué artículo garantiza la igualdad ante la ley?", o: ["Art. 14", "Art. 10", "Art. 2"], r: 0 }
        ],

            { p: "¿Quién es el tutor del Rey menor?", o: ["Designado en testamento o por Cortes", "El Juez", "El Estado"], r: 0 }
        ],
        6: [

            { p: "¿Cuál es la cámara de representación territorial?", o: ["El Senado", "El Congreso", "Las CCAA"], r: 0 },
            { p: "¿Cuántos diputados tiene el Congreso?", o: ["Entre 300 y 400", "500", "250"], r: 0 },
            { p: "¿Cuál es la duración del mandato de las Cortes?", o: ["4 años", "5 años", "6 años"], r: 0 },
            { p: "¿Quién elige al Defensor del Pueblo?", o: ["Las Cortes Generales", "El Rey", "El Gobierno"], r: 0 },
            { p: "¿De quién depende el Tribunal de Cuentas?", o: ["De las Cortes Generales", "Del Poder Judicial", "Del Ministerio de Hacienda"], r: 0 },
            { p: "¿Qué órgano convalida los Decretos-Leyes?", o: ["El Congreso de los Diputados", "El Senado", "El Tribunal Supremo"], r: 0 },
            { p: "¿Tienen los parlamentarios inviolabilidad?", o: ["Sí, por opiniones en sus funciones", "No", "Solo el Presidente"], r: 0 },
            { p: "¿Qué mayoría se requiere para una Ley Orgánica?", o: ["Absoluta del Congreso", "Simple", "3/4"], r: 0 },
            { p: "¿Quién preside la sesión conjunta de las Cortes?", o: ["Presidente del Congreso", "Presidente del Senado", "El Rey"], r: 0 }
        ],
        7: [
            { p: "¿Quién dirige la política interior y exterior?", o: ["El Gobierno", "El Rey", "El Congreso"], r: 0 },
            { p: "¿Quién propone al Rey el nombramiento de Ministros?", o: ["El Presidente del Gobierno", "Las Cortes", "El pueblo"], r: 0 },
            { p: "¿Ante quién responde el Gobierno solidariamente?", o: ["Ante el Congreso de los Diputados", "Ante el Senado", "Ante el Rey"], r: 0 },
            { p: "¿Qué mayoría requiere la moción de censura?", o: ["Absoluta del Congreso", "Simple", "2/3"], r: 0 },
            { p: "¿Debe incluir la moción de censura un candidato?", o: ["Sí (Moción constructiva)", "No", "Solo si se quiere"], r: 0 },
            { p: "¿Quién plantea la cuestión de confianza?", o: ["El Presidente del Gobierno", "El Rey", "La Oposición"], r: 0 },
            { p: "¿Qué ocurre si el Congreso niega la confianza?", o: ["El Gobierno dimite", "Se disuelve el Senado", "No pasa nada"], r: 0 },
            { p: "¿Pueden los miembros del Gobierno ejercer comercio?", o: ["No, tienen incompatibilidad", "Sí", "Solo si es poco"], r: 0 },
            { p: "¿Quién nombra a los Secretarios de Estado?", o: ["El Consejo de Ministros", "El Rey", "El Presidente solo"], r: 0 },
            { p: "¿Dónde se regulan las funciones del Gobierno?", o: ["Título IV", "Título III", "Título V"], r: 0 }
        ],
        8: [
            { p: "¿En nombre de quién se administra la justicia?", o: ["Del Rey", "Del pueblo", "Del Estado"], r: 0 },
            { p: "¿Cuál es el órgano de gobierno de los jueces?", o: ["Consejo General del Poder Judicial", "Tribunal Supremo", "Ministerio de Justicia"], r: 0 },
            { p: "¿Son los jueces responsables?", o: ["Sí, e independientes e inamovibles", "No", "Solo ante el Rey"], r: 0 },
            { p: "¿Cuál es el órgano jurisdiccional superior en todos los órdenes?", o: ["Tribunal Supremo", "Tribunal Constitucional", "Audiencia Nacional"], r: 0 },
            { p: "¿Quién nombra al Fiscal General del Estado?", o: ["El Rey, a propuesta del Gobierno", "Los jueces", "Las Cortes"], r: 0 },
            { p: "¿Es la justicia gratuita?", o: ["Sí, para quienes acrediten insuficiencia de recursos", "Siempre", "Nunca"], r: 0 },
            { p: "¿Quién preside el TS y el CGPJ?", o: ["La misma persona", "El Rey", "El Ministro"], r: 0 },
            { p: "¿Cuántos vocales tiene el CGPJ?", o: ["20 más el Presidente", "10", "15"], r: 0 },
            { p: "¿Están prohibidos los tribunales de excepción?", o: ["Sí", "No", "Solo en guerra"], r: 0 },
            { p: "¿Qué principio rige la actuación de la Fiscalía?", o: ["Unidad de actuación y dependencia jerárquica", "Independencia total", "Anarquía"], r: 0 }
        ],
        9: [

            { p: "¿Por cuánto tiempo son nombrados?", o: ["9 años", "4 años", "Vitalicios"], r: 0 },
            { p: "¿Quién propone a 4 miembros del TC?", o: ["El Congreso y otros 4 el Senado", "El Rey", "Las CCAA"], r: 0 },
            { p: "¿Qué recurso se interpone contra leyes?", o: ["Recurso de Inconstitucionalidad", "Recurso de Alzada", "Amparo"], r: 0 },

            { p: "¿Son las sentencias del TC recurribles?", o: ["No, tienen valor de cosa juzgada", "Sí, ante el TS", "Sí, ante el Gobierno"], r: 0 },
            { p: "¿Tiene el TC jurisdicción en toda España?", o: ["Sí", "Solo en Madrid", "No"], r: 0 },
            { p: "¿Puede el TC declarar la nulidad de una ley?", o: ["Sí", "No, solo el Gobierno", "Solo el Rey"], r: 0 },
            { p: "¿Quién propone a 2 miembros del TC?", o: ["El Gobierno y otros 2 el CGPJ", "Las Cortes", "El pueblo"], r: 0 },
            { p: "La condición de miembro del TC es incompatible con...", o: ["Todo mandato representativo", "Nada", "Ser profesor"], r: 0 }
        ],
        10: [
            { p: "¿Qué principio rige a la Administración Pública?", o: ["Eficacia, jerarquía y descentralización", "Caos y lentitud", "Favoritismo"], r: 0 },
            { p: "¿Qué ley regula el Procedimiento Administrativo Común?", o: ["Ley 39/2015", "Código Penal", "Ley de Caza"], r: 0 },
            { p: "¿Cuál es un organismo autónomo?", o: ["Entidad con personalidad jurídica propia", "Un ministerio", "Una empresa privada"], r: 0 },
            { p: "¿Qué artículo de la CE habla de la Administración?", o: ["Art. 103", "Art. 1", "Art. 155"], r: 0 },
            { p: "¿Quién nombra a los funcionarios?", o: ["La Administración competente", "El Rey siempre", "El azar"], r: 0 },
            { p: "¿Qué es una Entidad Pública Empresarial?", o: ["Organismo que se financia con ingresos de mercado", "Una ONG", "Un partido"], r: 0 },
            { p: "¿Qué principio garantiza el acceso al empleo público?", o: ["Mérito y capacidad", "Amistad", "Antigüedad solo"], r: 0 },
            { p: "¿Está sometida la Administración a la Ley?", o: ["Sí, plenamente", "No", "Solo en parte"], r: 0 },
            { p: "¿Qué es la Administración Instrumental?", o: ["Organismos creados para tareas específicas", "La policía", "Los jueces"], r: 0 },
            { p: "¿Quién crea los Ministerios?", o: ["El Presidente del Gobierno por Real Decreto", "Las Cortes", "El Rey"], r: 0 }
        ]
    };

    const TITULOS = [
        "Tema 1: Estado social y democrático", "Tema 2: La transición española",
        "Tema 3: Constitución y estabilidad", "Tema 4: Derechos fundamentales",
        "Tema 5: La Corona", "Tema 6: Cortes Generales",
        "Tema 7: El Gobierno", "Tema 8: Poder Judicial",
        "Tema 9: Tribunal Constitucional", "Tema 10: Administración Pública"
    ];

    let tAct = null, pIdx = 0;

    function iniciar() { renderCal(); renderTem(); }

    function renderCal() {
        const grid = document.getElementById('cal-grid'), plan = JSON.parse(localStorage.getItem('p_si') || "{}"), hoy = new Date().getDate();
        grid.innerHTML = "";
        for(let i=1; i<=31; i++) {
            const d = document.createElement('div'); d.className = 'dia';
            const t = plan[i] || "";
            d.innerHTML = `<span class="dia-num">${i}</span><div class="info-estudio">${t ? 'T'+t : ''}</div>`;
            d.onclick = () => {
                let n = prompt("Tema (1-10):", t);
                if(n !== null) { plan[i]=n; localStorage.setItem('p_si', JSON.stringify(plan)); renderCal(); if(i==hoy) start(n); }
            };
            grid.appendChild(d); if(i==hoy && t) start(t);
        }
    }

    function renderTem() {
        const dom = document.getElementById('temario-dom'), prog = JSON.parse(localStorage.getItem('g_si') || "[]");
        dom.innerHTML = "";
        TITULOS.forEach((tit, i) => {
            const id = i+1, chk = prog.includes(id) ? "checked" : "";
            dom.innerHTML += `<div style="margin:5px 0"><input type="checkbox" ${chk} onchange="toggle(${id})"> <span onclick="start(${id})" style="cursor:pointer; color:blue; text-decoration:underline">${tit}</span></div>`;
        });
        const p = Math.round((prog.length / 10) * 100);
        document.getElementById('progreso-relleno').style.width = p + "%";
        document.getElementById('progreso-relleno').innerText = p + "%";
    }

    function toggle(id) {
        let g = JSON.parse(localStorage.getItem('g_si') || "[]");
        g.includes(id) ? g = g.filter(x => x!==id) : g.push(id);
        localStorage.setItem('g_si', JSON.stringify(g)); renderTem();
    }

    function start(id) { tAct = parseInt(id); pIdx = 0; loadP(); }

    function loadP() {
        const c = document.getElementById('test-container'), b = BANCO_TEST[tAct];
        if(!b || pIdx >= 10) { c.innerHTML = "<h3>✅ ¡Completado!</h3>"; return; }
        const d = b[pIdx];
        c.innerHTML = `<h3>T${tAct} - ${pIdx+1}/10</h3><p>${d.p}</p>` + 
                      d.o.map((o, i) => `<button class="opcion-test" onclick="check(${i},${d.r},this)">${o}</button>`).join('') + `<div id="feedback"></div>`;
    }

    function check(e, c, el) {
        if(e===c) { el.classList.add('correcta'); setTimeout(() => { pIdx++; loadP(); }, 1200); }
        else { el.classList.add('incorrecta'); }
    }

    window.onload = iniciar;
</script>
</body>
</html>
